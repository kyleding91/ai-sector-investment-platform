<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI Sector — Stock</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
  </style>
</head>
<body class="bg-gray-50 text-gray-900">
<div class="max-w-3xl mx-auto p-6">
  <a href="/" class="text-sm text-blue-600 hover:underline">← Back to heat map</a>
  <header class="mt-3 mb-4">
    <h1 id="title" class="text-2xl font-bold">Loading…</h1>
    <div id="subtitle" class="text-sm text-gray-500"></div>
  </header>
  <div id="body"></div>
</div>

<script src="/panel.js"></script>
<script>
  const apiUrl = PanelLib.apiUrl;
  const params = new URLSearchParams(location.search);
  const ticker = (params.get('ticker') || '').toUpperCase();

  async function load() {
    const body = document.getElementById('body');
    if (!ticker) { body.innerHTML = '<div class="text-sm text-red-600">No ?ticker= specified.</div>'; return; }
    document.title = `AI Sector — ${ticker}`;
    try {
      const [snap, returnsJson, companiesJson, metrics, insight, filingInsights, filingsJson] = await Promise.all([
        fetch(apiUrl('/api/snapshot/' + encodeURIComponent(ticker))).then(r => r.json()),
        fetch(apiUrl('/api/returns')).then(r => r.json()),
        fetch(apiUrl('/api/companies')).then(r => r.json()).catch(() => ({ companies: [] })),
        fetch(apiUrl('/api/metrics/' + encodeURIComponent(ticker))).then(r => r.json()).catch(() => null),
        fetch(apiUrl('/api/insights/stock/' + encodeURIComponent(ticker))).then(r => r.json()).catch(() => null),
        fetch(apiUrl('/api/filing-insights/' + encodeURIComponent(ticker))).then(r => r.json()).catch(() => null),
        fetch(apiUrl('/api/filings/' + encodeURIComponent(ticker))).then(r => r.json()).catch(() => ({ filings: [] })),
      ]);
      const heatRow = (returnsJson.data || []).find(r => r.ticker === ticker);
      const co = (companiesJson.companies || []).find(c => c.ticker === ticker);
      const name = snap.name || (co && co.name) || ticker;
      const segment = snap.segment || (co && co.segment) || '';
      document.getElementById('title').textContent = `${ticker} — ${name}`;
      document.getElementById('subtitle').textContent = segment + (co && co.layer ? ` · Layer ${co.layer}` : '');
      PanelLib.renderCompany(body, {
        ticker,
        snapshot: snap.exists ? snap : null,
        heatRow,
        primaryBenchmark: returnsJson.primary_benchmark,
        metrics,
        insight,
        filingInsights,
        filings: (filingsJson && filingsJson.filings) || [],
        notes: co ? co.notes : '',
        compact: false,
      });
    } catch (e) {
      body.innerHTML = `<div class="text-sm text-red-600">Failed: ${PanelLib.escapeHtml(e.message)}</div>`;
    }
  }
  load();
</script>
</body>
</html>
