# Tooling config for the AI Sector Investment Platform.
# Runtime deps live in requirements.txt; dev/test deps in requirements-dev.txt.
# There is no build step — this file only configures ruff + pytest.

[tool.ruff]
target-version = "py310"
line-length = 100
# Generated/large corpora are never linted.
extend-exclude = ["data", "filings", "frontend"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP"]
# E501 (line-too-long) is ignored on purpose: the watchlist in backend/companies.py
# is a hand-aligned table and several modules carry long descriptive strings/docstrings
# that read better unwrapped. Everything else is enforced.
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
# Tests use assert + reimport fixtures freely.
"tests/*" = ["B011"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
# Quiet third-party deprecation noise so failures stand out.
filterwarnings = [
    "ignore::DeprecationWarning",
    "ignore::UserWarning",
]
