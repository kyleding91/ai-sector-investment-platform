name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Test (pytest)
        # The DB and filings corpus are gitignored, so CI runs against an empty
        # SQLite db — structural tests run; data-dependent tests auto-skip via
        # the HAS_* guards in tests/conftest.py.
        run: pytest
